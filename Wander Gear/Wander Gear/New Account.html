<head>
    <title>Wander Gear - Create new Account</title>
    <link rel="stylesheet" href="styles/New account.css"> <!-- Link to external CSS file -->
    <script src="js/Newac.js"></script> <!-- Link to external JavaScript file -->
</head>

<body>
    <!-- Header Section -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="home.html">
                    <img src="images/Logo.png">
                </a> <!-- Replace with actual logo path -->
            </div>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="#">Book Now</a></li>
                    <li><a href="#">Packages</a></li>
                    <li><a href="#">Gallery</a></li>
                    <li><a href="#">About Us</a></li>
                </ul>
            </nav>
            <div class="user-icon">
                <img src="images/log in.png" alt="User"> <!-- Replace with actual user icon path -->
            </div>
        </div>
    </header>


    <main>
        <form class="registration-form">
            <h1>Become a Member</h1>
            <br>
            <label for="fullname">Full Name*</label>
            <input type="text" id="fullname" required>

            <label for="phone">Telephone Number*</label>
            <input type="tel" id="phone" required>

            <label for="email">Email*</label>
            <input type="email" id="email" required>

            <label for="password">Password*</label>
            <input type="password" id="password" required>

            <label for="confirm-password">Confirm Password*</label>
            <input type="password" id="confirm-password" required>
            <br>
            <br>
            <button type="submit" id="register-btn">Register</button>
        </form>
    </main>
    


    <footer>
        <div class="footer-container">
            <div class="footer-section about">
                <h3>About</h3>
                <ul>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </div>
            <div class="footer-section faq">
                <h3>FAQ</h3>
                <ul>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </div>
            <div class="footer-section policy">
                <h3>Policy</h3>
                <ul>
                    <li><a href="#">Terms & Conditions</a></li>
                    <li><a href="#">Privacy Policy</a></li>
                </ul>
            </div>
        </div>
        <p>&copy; 2024 Website. All rights reserved.</p>
    </footer>
</body>

</html>
